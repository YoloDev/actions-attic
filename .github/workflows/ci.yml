name: CI
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v2

      - name: Check Nix flake Nixpkgs inputs
        uses: DeterminateSystems/flake-checker-action@c69473f65c5db52bfd5542b6766583c43ce175f6 # main

      - name: Show flake
        run: nix flake show

      - name: Check flake
        run: nix flake check

  test:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: ./
        id: attic
        with:
          server: https://attic.alxandr.me/
          cache: attic
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Build
        run: nix build .#attic --accept-flake-config

      - name: Push to attic
        run: attic push "${{ steps.attic.outputs.cache }}" ./result
        if: github.ref == 'refs/heads/main'
